name: CI Verify (reusable)

on:
  workflow_call:
    inputs:
      run_checks: { type: boolean, default: true }   # lint + typecheck
      run_build:  { type: boolean, default: true }   # next build（全 runtime）
      run_unit:   { type: boolean, default: true }   # 单测 + golden eval
      run_e2e:    { type: boolean, default: true }   # playwright mock e2e
      run_windows_smoke: { type: boolean, default: true }  # Windows 打包态运行时 smoke（见 windows_smoke job）

permissions:
  contents: read

jobs:
  checks:
    if: inputs.run_checks
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    if: inputs.run_build
    name: Build (Next, all runtimes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{ts,tsx,js,jsx,css}', 'lib/**/*.{ts,tsx}', 'components/**/*.{ts,tsx}') }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextcache-${{ runner.os }}-
      - run: bash scripts/ci-cancel-aware.sh npm run build

  unit:
    if: inputs.run_unit
    name: Unit + Golden (SKIP_LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Setup Python worker venv
        run: |
          python -m venv workers/.venv
          workers/.venv/bin/python -m pip install --upgrade pip
          workers/.venv/bin/python -m pip install -r requirements.txt
      - run: bash scripts/ci-cancel-aware.sh npm test
      - run: bash scripts/ci-cancel-aware.sh npm run eval:golden:ci

  windows_smoke:
    if: inputs.run_windows_smoke
    name: Windows packaged smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{ts,tsx,js,jsx,css}', 'lib/**/*.{ts,tsx}', 'components/**/*.{ts,tsx}') }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextcache-${{ runner.os }}-
      # 组装「用户机上真正跑的那份」next-server：next build → prepare-tauri（拷内嵌 node / SDK 原生 CLI /
      # ripgrep / 完整 .next/server 覆盖；并跑打包期硬校验：node:sqlite 可用、SDK 二进制存在）。
      - run: npm run build
      - run: npm run tauri:prepare
      # 校验 Rust 外壳在 Windows 能编译（含 KILL_ON_JOB_CLOSE 的 Job Object FFI，mac 上被 cfg 隔离编不到）。
      - name: Cargo check (Windows shell, incl. Job Object FFI)
        working-directory: src-tauri
        run: cargo check
      # 启动组装好的 next-server，打一圈路由，扫描有无「漏 chunk / 平台二进制缺失 / stdio 编码」等致命签名。
      - name: Packaged runtime smoke
        run: node scripts/windows-smoke.mjs

  e2e:
    if: inputs.run_e2e
    name: E2E (mock agent)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Setup Python worker venv
        run: |
          python -m venv workers/.venv
          workers/.venv/bin/python -m pip install --upgrade pip
          workers/.venv/bin/python -m pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      # 聊天是产品本体:chat.spec 设为"必过核心门",红了即阻塞合并。
      - name: E2E core (chat) — required
        run: bash scripts/ci-cancel-aware.sh npx playwright test e2e/mock/chat.spec.ts
      # 外围用例(知识库/搜索/预览/遥测/页面等)非阻塞:跑、报告、但不卡合并;
      # 个别 flaky 也不会拦住聊天主干。失败仍会在 UI 上以警告显示、并上传 trace。
      - name: E2E peripheral — non-blocking
        run: bash scripts/ci-cancel-aware.sh npx playwright test --grep-invert "^chat:"
        continue-on-error: true
      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
