name: CLA Assistant

# 外部贡献者的 PR 合并前必须签署 CLA（见仓库根 CLA.md）。
# 贡献者在 PR 评论一行 "I have read the CLA Document and I hereby sign the CLA"
# 即视为签署；签名记录存到独立分支 cla-signatures 的 signatures/cla.json。
#
# 启用前需手动做的事（一次性）：
#   1. 生成一个 PAT（classic，repo scope），加为仓库 secret：CLA_SIGNATURES_TOKEN
#      （用于写签名文件；默认 GITHUB_TOKEN 写不了独立分支也触发不了后续校验）。
#   2. Settings → Actions → Workflow permissions 设为 "Read and write"。
#   3. 把下面 allowlist 改成你真实的维护者 GitHub 登录名。
#   4. 推送本文件需要 token 带 workflow scope（gh auth refresh -s workflow 或临时 SSH key）。

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recreate-cla' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT，用于把签名写进独立分支（见文件头说明）。
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/joyin-frog/finwork/blob/main/CLA.md'
          # 签名存到独立分支，避免污染 main 历史；action 会自动建分支。
          branch: 'cla-signatures'
          # 维护者 / 机器人无需签署——改成你真实的 GitHub 登录名。
          allowlist: gaoyang34,joyin-frog,dependabot[bot],*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >-
            感谢贡献！合并前请先阅读并签署
            [CLA](https://github.com/joyin-frog/finwork/blob/main/CLA.md)：
            在本 PR 评论一行
            `I have read the CLA Document and I hereby sign the CLA` 即可。
          custom-allsigned-prcomment: '✅ 全部贡献者已签署 CLA，感谢！'
